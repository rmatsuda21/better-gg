type Query {
  currentUser: User
  user(id: ID, slug: String): User
  event(id: ID, slug: String): Event
  entrant(id: ID): Entrant
  player(id: ID!): Player
  videogame(id: ID, slug: String): Videogame
  phase(id: ID): Phase
  phaseGroup(id: ID): PhaseGroup
  tournament(id: ID, slug: String): Tournament
  tournaments(query: TournamentQuery): TournamentConnection
}

input TournamentQuery {
  page: Int
  perPage: Int
  sortBy: String
  filter: TournamentPageFilter
}

input TournamentPageFilter {
  past: Boolean
  upcoming: Boolean
  videogameIds: [ID]
  name: String
  countryCode: String
  addrState: String
  afterDate: Timestamp
  beforeDate: Timestamp
  hasOnlineEvents: Boolean
  regOpen: Boolean
  isFeatured: Boolean
  location: TournamentLocationFilter
}

input TournamentLocationFilter {
  distanceFrom: String
  distance: String
}

type TournamentConnection {
  pageInfo: PageInfo
  nodes: [Tournament]
}

type Address {
  country: String
  city: String
  state: String
}

type ProfileAuthorization {
  id: ID
  type: String
  url: String
  externalUsername: String
}

type PlayerRank {
  rank: Int
  title: String
}

type User {
  id: ID
  slug: String
  name: String
  bio: String
  player: Player
  location: Address
  images(type: String): [Image]
  authorizations(types: [SocialConnectionType]): [ProfileAuthorization]
  tournaments(query: UserTournamentsPaginationQuery): UserTournamentConnection
}

enum SocialConnectionType {
  TWITCH
  TWITTER
  DISCORD
  YOUTUBE
}

input UserTournamentsPaginationQuery {
  page: Int
  perPage: Int
  filter: UserTournamentsPaginationFilter
}

input UserTournamentsPaginationFilter {
  past: Boolean
  upcoming: Boolean
  videogameId: [ID]
  search: PaginationSearchType
  tournamentView: String
}

input PaginationSearchType {
  fieldsToSearch: [String]
  searchString: String
}

type UserTournamentConnection {
  pageInfo: PageInfo
  nodes: [Tournament]
}

type PageInfo {
  total: Int
  totalPages: Int
  page: Int
  perPage: Int
}

input EventFilter {
  videogameId: [ID]
}

type Tournament {
  id: ID
  name: String
  slug: String
  startAt: Timestamp
  endAt: Timestamp
  numAttendees: Int
  city: String
  addrState: String
  countryCode: String
  isOnline: Boolean
  venueName: String
  images(type: String): [Image]
  events(limit: Int, filter: EventFilter): [Event]
  participants(query: ParticipantPaginationQuery): ParticipantConnection
}

type Event {
  id: ID
  name: String
  slug: String
  startAt: Timestamp
  state: String
  numEntrants: Int
  isOnline: Boolean
  tournament: Tournament
  videogame: Videogame
  userEntrant(userId: ID): Entrant
  entrants(query: EventEntrantPageQuery): EntrantConnection
  sets(page: Int, perPage: Int, sortType: SetSortType, filters: SetFilters): SetConnection
  standings(query: StandingPaginationQuery): StandingConnection
  phases: [Phase]
}

input EventEntrantPageQuery {
  page: Int
  perPage: Int
  filter: EventEntrantPageQueryFilter
}

input EventEntrantPageQueryFilter {
  name: String
}

input SetFilters {
  entrantIds: [ID]
  state: [Int]
}

input StandingPaginationQuery {
  page: Int
  perPage: Int
}

type Entrant {
  id: ID
  name: String
  initialSeedNum: Int
  isDisqualified: Boolean
  event: Event
  participants: [Participant]
  seeds: [Seed]
  standing: Standing
  paginatedSets(page: Int, perPage: Int, sortType: SetSortType, filters: SetFilters): SetConnection
}

type Participant {
  id: ID
  gamerTag: String
  prefix: String
  user: User
  player: Player
  entrants: [Entrant]
}

input ParticipantPaginationQuery {
  page: Int
  perPage: Int
}

type ParticipantConnection {
  pageInfo: PageInfo
  nodes: [Participant]
}

type Player {
  id: ID
  gamerTag: String
  prefix: String
  user: User
  rankings(limit: Int, videogameId: ID): [PlayerRank]
  recentStandings(limit: Int, videogameId: ID): [Standing]
  sets(page: Int, perPage: Int): SetConnection
}

type Standing {
  id: ID
  placement: Int
  isFinal: Boolean
  entrant: Entrant
  player: Player
  container: StandingContainer
  stats: StandingStats
}

union StandingContainer = Event | Tournament

type StandingStats {
  score: StandingStatsScore
}

type StandingStatsScore {
  label: String
  value: Float
}

type SetConnection {
  pageInfo: PageInfo
  nodes: [Set]
}

type Set {
  id: ID
  state: Int
  round: Int
  fullRoundText: String
  identifier: String
  displayScore(mainEntrantId: ID): String
  winnerId: Int
  wPlacement: Int
  lPlacement: Int
  totalGames: Int
  completedAt: Timestamp
  slots: [SetSlot]
  games: [Game]
  event: Event
  phaseGroup: PhaseGroup
  winnerProgressionSeed: Seed
  loserProgressionSeed: Seed
}

type SetSlot {
  id: ID
  entrant: Entrant
  standing: Standing
  seed: Seed
  prereqType: String
  prereqId: String
  prereqPlacement: Int
}

type Game {
  id: ID
  orderNum: Int
  winnerId: Int
  state: Int
  selections: [GameSelection]
}

type GameSelection {
  id: ID
  entrant: Entrant
  selectionType: String
  selectionValue: Int
}

type Progression {
  id: ID
  originPhase: Phase
}

type Seed {
  id: ID
  seedNum: Int
  entrant: Entrant
  phase: Phase
  phaseGroup: PhaseGroup
  progressionSource: Progression
}

type Phase {
  id: ID
  name: String
  phaseOrder: Int
  bracketType: String
  state: String
  groupCount: Int
  numSeeds: Int
  event: Event
  phaseGroups: PhaseGroupConnection
  progressingInData: [ProgressionData]
  seeds(query: SeedPaginationQuery): SeedConnection
}

input SeedPaginationQuery {
  page: Int
  perPage: Int
}

type SeedConnection {
  pageInfo: PageInfo
  nodes: [Seed]
}

type ProgressionData {
  origin: Int
  numProgressing: Int
}

type PhaseGroupConnection {
  pageInfo: PageInfo
  nodes: [PhaseGroup]
}

type PhaseGroup {
  id: ID
  displayIdentifier: String
  bracketType: String
  bracketUrl: String
  startAt: Timestamp
  numRounds: Int
  state: Int
  phase: Phase
  sets(page: Int, perPage: Int, sortType: SetSortType, filters: SetFilters): SetConnection
  standings(query: StandingPaginationQuery): StandingConnection
}

type EntrantConnection {
  pageInfo: PageInfo
  nodes: [Entrant]
}

type StandingConnection {
  pageInfo: PageInfo
  nodes: [Standing]
}

type Videogame {
  id: ID
  name: String
  slug: String
  images: [Image]
  characters: [Character]
}

type Character {
  id: ID
  name: String
  images: [Image]
}

type Image {
  id: ID
  url: String
}

enum SetSortType {
  NONE
  CALL_ORDER
  MAGIC
  RECENT
  STANDARD
  ROUND
}

scalar Timestamp
